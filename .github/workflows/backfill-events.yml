name: Backfill buyback events

on:
  workflow_dispatch:
    inputs:
      start:
        description: Backfill start date in YYYYMMDD.
        required: true
      end:
        description: Backfill end date in YYYYMMDD.
        required: true
      run_id:
        description: Optional run id. Defaults to start-end-timestamp.
        required: false
        default: ""
      chunk_days:
        description: Days per OpenDART discovery chunk. Keep <= 92.
        required: false
        default: "14"
      page_limit:
        description: Max OpenDART disclosure pages to scan per disclosure type and chunk.
        required: false
        default: "50"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: buybacks-event-backfill-${{ github.event.inputs.start }}-${{ github.event.inputs.end }}
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    env:
      BACKFILL_RUN_ID: ${{ github.event.inputs.run_id || format('{0}-{1}-{2}', github.event.inputs.start, github.event.inputs.end, github.run_id) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python test tools
        run: python -m pip install --upgrade pip pytest

      - name: Collect event backfill into temporary table
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: >
          python scripts/buybacks/backfill_events.py collect
          --start "${{ github.event.inputs.start }}"
          --end "${{ github.event.inputs.end }}"
          --run-id "$BACKFILL_RUN_ID"
          --chunk-days "${{ github.event.inputs.chunk_days }}"
          --page-limit "${{ github.event.inputs.page_limit }}"
          --backfill-dir data/backfills
          --data-dir public/data/buybacks

      - name: Merge temporary backfill into dataset on branch
        run: >
          python scripts/buybacks/backfill_events.py merge
          --run-id "$BACKFILL_RUN_ID"
          --backfill-dir data/backfills
          --data-dir public/data/buybacks

      - name: Validate merged dataset
        run: python scripts/buybacks/validate_buybacks_dataset.py public/data/buybacks

      - name: Test Python pipeline
        run: python -m pytest

      - name: Prepare pull request body
        shell: bash
        run: |
          python - <<'PY' > PR_BODY.md
          import json
          from pathlib import Path
          status = json.loads(Path("data/backfills/${{ env.BACKFILL_RUN_ID }}/status.json").read_text(encoding="utf-8"))
          body = "\n".join([
              "Historical event backfill completed.",
              "",
              f"- Run id: `{status['run_id']}`",
              f"- Period: `{status['start']}` to `{status['end']}`",
              f"- Duration: `{status.get('duration_seconds')}` seconds",
              f"- Collected events: `{status.get('events_count', 0)}`",
              f"- New events: `{status.get('merge_new_events_count', status.get('new_events_count', 0))}`",
              f"- Duplicate events: `{status.get('merge_duplicate_events_count', status.get('duplicate_events_count', 0))}`",
              f"- Collected execution reports: `{status.get('executions_count', 0)}`",
              "",
              "The PR contains the temporary backfill table under `data/backfills/` and the merged `public/data/buybacks` JSON. Merge this PR to accept the backfill.",
          ])
          print(body)
          PY

      - name: Create backfill pull request
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          branch="backfill/events-${BACKFILL_RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          # Add the run-table files explicitly: the run directory also holds a
          # raw/ response cache that must not be committed.
          for name in companies.json disclosures.json events.json executions.json status.json; do
            path="data/backfills/${BACKFILL_RUN_ID}/${name}"
            if [ -f "$path" ]; then
              git add "$path"
            fi
          done
          git add public/data/buybacks
          if git diff --cached --quiet; then
            echo "No backfill changes to commit."
            exit 0
          fi
          git commit -m "Backfill buyback events ${BACKFILL_RUN_ID}"
          # Long collections start from a stale checkout; if master gained
          # workflow-file changes meanwhile, pushing the stale base is rejected
          # (GITHUB_TOKEN lacks the workflows scope). Rebase the single data
          # commit onto current master before pushing.
          git fetch origin master
          git rebase origin/master
          git push --set-upstream origin "$branch"
          manual_url="https://github.com/${GITHUB_REPOSITORY}/pull/new/${branch}"
          if pr_url="$(gh pr create \
            --repo "$GITHUB_REPOSITORY" \
            --base master \
            --head "$branch" \
            --title "Backfill buyback events ${{ github.event.inputs.start }}-${{ github.event.inputs.end }}" \
            --body-file PR_BODY.md 2> pr-error.log)"; then
            echo "Created pull request: $pr_url"
            {
              echo "### Backfill pull request created"
              echo ""
              echo "- Branch: \`$branch\`"
              echo "- Pull request: $pr_url"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            cat pr-error.log
            echo "::warning::GitHub Actions could not create a pull request. The backfill branch was pushed; create the PR manually from $manual_url."
            {
              echo "### Backfill branch created"
              echo ""
              echo "- Branch: \`$branch\`"
              echo "- Manual PR URL: $manual_url"
              echo ""
              echo "GitHub Actions could not create the PR because repository settings do not permit workflow tokens to create pull requests."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload backfill run artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: buybacks-event-backfill-${{ env.BACKFILL_RUN_ID }}
          path: data/backfills/${{ env.BACKFILL_RUN_ID }}

      - name: Notify value-invest on failure
        if: failure()
        env:
          NOTIFY_URL: ${{ secrets.VALUE_INVEST_NOTIFY_URL }}
          NOTIFY_TOKEN: ${{ secrets.VALUE_INVEST_INTERNAL_TOKEN }}
          WORKFLOW_NAME: ${{ github.workflow }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$NOTIFY_URL" ] || [ -z "$NOTIFY_TOKEN" ]; then
            echo "VALUE_INVEST_NOTIFY_URL or VALUE_INVEST_INTERNAL_TOKEN not set, skipping notification."
            exit 0
          fi
          body=$(jq -n \
            --arg title "$WORKFLOW_NAME failed" \
            --arg text "Workflow run: $RUN_URL" \
            --arg source "buybacks" \
            '{title: $title, text: $text, source: $source}')
          curl -sf -X POST "$NOTIFY_URL/api/internal/notify" \
            -H "Content-Type: application/json" \
            -H "X-Internal-Token: $NOTIFY_TOKEN" \
            -d "$body"
