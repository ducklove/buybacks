name: Deploy Pages

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Install Python test tools
        run: python -m pip install --upgrade pip pytest

      - name: Install frontend dependencies
        run: npm ci

      - name: Validate committed data
        run: python scripts/buybacks/validate_buybacks_dataset.py public/data/buybacks

      - name: Test Python pipeline
        run: python -m pytest

      - name: Test frontend
        run: npm run test

      - name: Build static site
        env:
          VITE_BASE_PATH: ./
          VITE_KIS_PROXY_URL: ${{ secrets.KIS_PROXY_URL }}
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

      - name: Notify value-invest on failure
        if: failure()
        env:
          NOTIFY_URL: ${{ secrets.VALUE_INVEST_NOTIFY_URL }}
          NOTIFY_TOKEN: ${{ secrets.VALUE_INVEST_INTERNAL_TOKEN }}
          WORKFLOW_NAME: ${{ github.workflow }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$NOTIFY_URL" ] || [ -z "$NOTIFY_TOKEN" ]; then
            echo "VALUE_INVEST_NOTIFY_URL or VALUE_INVEST_INTERNAL_TOKEN not set, skipping notification."
            exit 0
          fi
          body=$(jq -n \
            --arg title "$WORKFLOW_NAME failed" \
            --arg text "Workflow run: $RUN_URL" \
            --arg source "buybacks" \
            '{title: $title, text: $text, source: $source}')
          curl -sf -X POST "$NOTIFY_URL/api/internal/notify" \
            -H "Content-Type: application/json" \
            -H "X-Internal-Token: $NOTIFY_TOKEN" \
            -d "$body"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment-retry.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      # The Pages deployment API intermittently returns "Deployment failed,
      # try again later" and consistently succeeds on retry, so retry once
      # before treating the run as failed.
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Retry deploy to GitHub Pages
        id: deployment-retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v5

      - name: Notify value-invest on failure
        if: failure()
        env:
          NOTIFY_URL: ${{ secrets.VALUE_INVEST_NOTIFY_URL }}
          NOTIFY_TOKEN: ${{ secrets.VALUE_INVEST_INTERNAL_TOKEN }}
          WORKFLOW_NAME: ${{ github.workflow }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$NOTIFY_URL" ] || [ -z "$NOTIFY_TOKEN" ]; then
            echo "VALUE_INVEST_NOTIFY_URL or VALUE_INVEST_INTERNAL_TOKEN not set, skipping notification."
            exit 0
          fi
          body=$(jq -n \
            --arg title "$WORKFLOW_NAME failed" \
            --arg text "Workflow run: $RUN_URL" \
            --arg source "buybacks" \
            '{title: $title, text: $text, source: $source}')
          curl -sf -X POST "$NOTIFY_URL/api/internal/notify" \
            -H "Content-Type: application/json" \
            -H "X-Internal-Token: $NOTIFY_TOKEN" \
            -d "$body"
