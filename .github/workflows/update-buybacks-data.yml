name: Update buybacks data

on:
  workflow_dispatch:
    inputs:
      lookback_days:
        description: Days to overlap before the latest committed disclosure date.
        required: false
        default: "7"
      price_lookback_days:
        description: Recent event window for refreshing incomplete price reactions.
        required: false
        default: "75"
  schedule:
    - cron: "30 20 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: buybacks-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '7' }}
      PRICE_LOOKBACK_DAYS: ${{ github.event.inputs.price_lookback_days || '75' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python test tools
        run: python -m pip install --upgrade pip pytest

      - name: Incrementally update buybacks data
        timeout-minutes: 25
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          DART_RETRIES: "3"
          DART_TIMEOUT_SECONDS: "30"
          KIS_PROXY_URL: ${{ secrets.KIS_PROXY_URL }}
          KIS_PROXY_TOKEN: ${{ secrets.KIS_PROXY_TOKEN }}
        run: >
          python scripts/buybacks/build_buybacks_dataset.py
          --live-if-available
          --incremental
          --output public/data/buybacks
          --stock-codes ALL
          --holding-stock-codes EVENTS
          --holding-source stock_totals
          --listed-issue-source naver
          --report-codes 11011
          --max-companies 0
          --max-holding-companies 0
          --discovery-page-limit 3
          --incremental-lookback-days "$LOOKBACK_DAYS"
          --incremental-price-lookback-days "$PRICE_LOOKBACK_DAYS"

      - name: Validate data
        run: python scripts/buybacks/validate_buybacks_dataset.py public/data/buybacks

      - name: Test Python pipeline
        run: python -m pytest

      - name: Commit data changes
        id: commit-data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/buybacks
          if git diff --cached --quiet; then
            echo "No buybacks data changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Update buybacks data"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.commit-data.outputs.changed == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Install frontend dependencies
        if: steps.commit-data.outputs.changed == 'true'
        run: npm ci

      - name: Test frontend
        if: steps.commit-data.outputs.changed == 'true'
        run: npm run test

      - name: Build static site
        if: steps.commit-data.outputs.changed == 'true'
        env:
          VITE_BASE_PATH: ./
          VITE_KIS_PROXY_URL: ${{ secrets.KIS_PROXY_URL }}
        run: npm run build

      - name: Configure Pages
        if: steps.commit-data.outputs.changed == 'true'
        uses: actions/configure-pages@v6

      - name: Upload artifact
        if: steps.commit-data.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

      - name: Deploy to GitHub Pages
        if: steps.commit-data.outputs.changed == 'true'
        id: deployment
        uses: actions/deploy-pages@v5
