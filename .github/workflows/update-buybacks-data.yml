name: Update buybacks data and deploy Pages

on:
  workflow_dispatch:
  push:
    branches:
      - master
  schedule:
    - cron: "20 20 * * 0"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Install Python test tools
        run: python -m pip install --upgrade pip pytest

      - name: Install frontend dependencies
        run: npm ci

      - name: Build buybacks static dataset
        timeout-minutes: 90
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          DART_RETRIES: "3"
          DART_TIMEOUT_SECONDS: "30"
          KIS_PROXY_URL: ${{ secrets.KIS_PROXY_URL }}
          KIS_PROXY_TOKEN: ${{ secrets.KIS_PROXY_TOKEN }}
        run: >
          python scripts/buybacks/build_buybacks_dataset.py
          --live-if-available
          --output public/data/buybacks
          --stock-codes ALL
          --holding-stock-codes ALL
          --holding-source stock_totals
          --report-codes 11011
          --max-companies 0
          --max-holding-companies 0
          --discovery-page-limit 3

      - name: Validate data
        run: python scripts/buybacks/validate_buybacks_dataset.py public/data/buybacks

      - name: Test Python pipeline
        run: python -m pytest

      - name: Test frontend
        run: npm run test

      - name: Build static site
        env:
          VITE_BASE_PATH: ./
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
