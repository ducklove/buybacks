name: Refresh holdings

on:
  workflow_dispatch:
  schedule:
    - cron: "30 19 1 * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: buybacks-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python test tools
        run: python -m pip install --upgrade pip pytest

      # The full-universe holding scan alone takes ~85 minutes (~3,975
      # companies), plus dividends, price reactions, and latest prices —
      # a 90-minute timeout was observed to cut off the final stage.
      - name: Refresh full holdings snapshot
        timeout-minutes: 150
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          DART_RETRIES: "3"
          DART_TIMEOUT_SECONDS: "30"
          KIS_PROXY_URL: ${{ secrets.KIS_PROXY_URL }}
          KIS_PROXY_TOKEN: ${{ secrets.KIS_PROXY_TOKEN }}
        # --incremental keeps events.json merge-based (no loss of history older
        # than the ~89-day discovery window) while --holding-stock-codes ALL
        # and --dividend-stock-codes ALL rescan holding snapshots and dividend
        # records for every listed company.
        run: >
          python scripts/buybacks/build_buybacks_dataset.py
          --live-if-available
          --incremental
          --output public/data/buybacks
          --stock-codes ALL
          --holding-stock-codes ALL
          --dividend-stock-codes ALL
          --holding-source stock_totals
          --listed-issue-source naver
          --report-codes 11011
          --max-companies 0
          --max-holding-companies 0
          --discovery-page-limit 50

      - name: Validate data
        run: python scripts/buybacks/validate_buybacks_dataset.py public/data/buybacks

      - name: Test Python pipeline
        run: python -m pytest

      - name: Commit data changes
        id: commit-data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/buybacks
          if git diff --cached --quiet; then
            echo "No buybacks data changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Refresh full holdings snapshot"
            git pull --rebase origin master
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.commit-data.outputs.changed == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Install frontend dependencies
        if: steps.commit-data.outputs.changed == 'true'
        run: npm ci

      - name: Test frontend
        if: steps.commit-data.outputs.changed == 'true'
        run: npm run test

      - name: Build static site
        if: steps.commit-data.outputs.changed == 'true'
        env:
          VITE_BASE_PATH: ./
          VITE_KIS_PROXY_URL: ${{ secrets.KIS_PROXY_URL }}
        run: npm run build

      - name: Configure Pages
        if: steps.commit-data.outputs.changed == 'true'
        uses: actions/configure-pages@v6

      - name: Upload artifact
        if: steps.commit-data.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

      # The Pages deployment API intermittently returns "Deployment failed,
      # try again later" and consistently succeeds on retry, so retry once
      # before treating the run as failed.
      - name: Deploy to GitHub Pages
        if: steps.commit-data.outputs.changed == 'true'
        id: deployment
        uses: actions/deploy-pages@v5
        continue-on-error: true

      # An immediate retry hits the same error window; a ~60s delay matches
      # the manual reruns that consistently succeeded.
      - name: Wait before deploy retry
        if: steps.commit-data.outputs.changed == 'true' && steps.deployment.outcome == 'failure'
        run: sleep 60

      - name: Retry deploy to GitHub Pages
        if: steps.commit-data.outputs.changed == 'true' && steps.deployment.outcome == 'failure'
        id: deployment-retry
        uses: actions/deploy-pages@v5

      - name: Notify value-invest on failure
        if: failure()
        env:
          NOTIFY_URL: ${{ secrets.VALUE_INVEST_NOTIFY_URL }}
          NOTIFY_TOKEN: ${{ secrets.VALUE_INVEST_INTERNAL_TOKEN }}
          WORKFLOW_NAME: ${{ github.workflow }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$NOTIFY_URL" ] || [ -z "$NOTIFY_TOKEN" ]; then
            echo "VALUE_INVEST_NOTIFY_URL or VALUE_INVEST_INTERNAL_TOKEN not set, skipping notification."
            exit 0
          fi
          body=$(jq -n \
            --arg title "$WORKFLOW_NAME failed" \
            --arg text "Workflow run: $RUN_URL" \
            --arg source "buybacks" \
            '{title: $title, text: $text, source: $source}')
          curl -sf -X POST "$NOTIFY_URL/api/internal/notify" \
            -H "Content-Type: application/json" \
            -H "X-Internal-Token: $NOTIFY_TOKEN" \
            -d "$body"
