<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="국내 상장사 자사주 취득·처분·소각·보유 현황을 추적하는 분석 대시보드."
    />
    <meta property="og:title" content="자사주 분석" />
    <meta
      property="og:description"
      content="국내 상장사 자사주 취득·처분·소각·보유 현황을 추적하는 분석 대시보드."
    />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%buybacks-icon.svg" />
    <title>자사주 분석</title>
    <script>
      // iframe embed + theme: ?theme=dark|light overrides stored theme; ?embed hides chrome.
      // data-theme 미설정 시에는 CSS의 prefers-color-scheme 폴백이 적용된다.
      (function () {
        try {
          var params = new URLSearchParams(location.search);
          var urlTheme = params.get("theme");
          var stored = localStorage.getItem("theme");
          var theme = urlTheme === "dark" || urlTheme === "light" ? urlTheme : stored;
          if (theme === "dark" || theme === "light") {
            document.documentElement.dataset.theme = theme;
          }
          var embed = params.get("embed");
          if (embed !== null && embed !== "0" && embed !== "false") {
            document.documentElement.dataset.embed = "1";
          }
        } catch (e) {
          /* localStorage 접근 불가 시 data-theme 미설정 → prefers-color-scheme 폴백 */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
